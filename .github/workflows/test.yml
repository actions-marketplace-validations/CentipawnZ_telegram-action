name: Action Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  pull_request:
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

jobs:
  test:
    name: Test Telegram Notifications
    runs-on: ubuntu-latest
    
    # We only run actual tests if secrets are available (prevents failures on forks)
    env:
      HAVE_SECRETS: ${{ secrets.TELEGRAM_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
      HAVE_TOPIC_SECRET: ${{ secrets.TELEGRAM_TOPIC_ID != '' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 1. Test Text Message (HTML)
        if: env.HAVE_SECRETS == 'true'
        uses: ./
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          format: 'HTML'
          message: |
            🧪 <b>Automated Test: Text Message</b>
            Repository: <code>${{ github.repository }}</code>
            Branch: <code>${{ github.ref_name }}</code>
            Commit: <code>${{ github.sha }}</code>
            Triggered by: <code>${{ github.actor }}</code>

      - name: Create Test File
        if: env.HAVE_SECRETS == 'true'
        run: |
          echo "This is an automated test document generated by GitHub Actions." > test-document.txt
          
      - name: 2. Test Document Upload
        if: env.HAVE_SECRETS == 'true'
        uses: ./
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          document: test-document.txt
          format: 'HTML'
          message: "🧪 Automated Test: Document Upload\nFile generated during CI/CD."

      - name: 3. Test Image Upload (via URL)
        if: env.HAVE_SECRETS == 'true'
        uses: ./
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          photo: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
          format: 'HTML'
          message: "🧪 Automated Test: Image Upload via URL"

      - name: 4. Test Topic Message
        if: env.HAVE_SECRETS == 'true' && env.HAVE_TOPIC_SECRET == 'true'
        uses: ./
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          topic_id: ${{ secrets.TELEGRAM_TOPIC_ID }}
          format: 'HTML'
          message: |
            🧪 <b>Automated Test: Topic Message</b>
            This message was successfully routed to the specific topic!
